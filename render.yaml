services:
  - type: web
    name: icecream-control-center
    runtime: node
    plan: free
    buildCommand: npm install && cd server && npm install && cd ../client && npm install --include=dev && cd .. && npm run build
    startCommand: cd server && node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NODE_ENV
        value: production
      - key: USE_MEMORY_DB
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: HOST
        value: 0.0.0.0
